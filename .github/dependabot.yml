version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: pip
    directory: "/apps/agents/xlsx-agent"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/apps/agents/pptx-agent"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/apps/agents/xlsx-agent"
    schedule:
      interval: weekly
